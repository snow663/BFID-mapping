name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run check > svelte-check.log 2>&1
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            svelte-check.log
            build.log
      - name: Report validation result
        if: steps.typecheck.outcome != 'success' || steps.build.outcome != 'success'
        run: |
          cat svelte-check.log
          cat build.log
          exit 1
