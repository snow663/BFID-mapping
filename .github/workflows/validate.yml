name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Check frontend
        run: |
          set -o pipefail
          npm run check 2>&1 | tee check.log
      - name: Upload check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-check-log
          path: check.log
          if-no-files-found: ignore
      - run: npm run build
