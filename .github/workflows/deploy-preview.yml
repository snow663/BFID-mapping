name: Deploy feature preview

on:
  push:
    branches:
      - main
    paths-ignore:
      - PREVIEW_STATUS.md
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out preview branch
        uses: actions/checkout@v4
        with:
          ref: agent/initial-local-first-mapping-app
      - name: Stamp feature build ID
        run: echo "VITE_BUILD_ID=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Write preview status
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'PREVIEW_STATUS.md';
            const success = process.env.DEPLOY_RESULT === 'success';
            const body = success
              ? `# Mobile preview\n\nStatus: live\n\nhttps://snow663.github.io/BFID-mapping/\n\nRun: https://github.com/${owner}/${repo}/actions/runs/${context.runId}\n`
              : `# Mobile preview\n\nStatus: failed\n\nBuild: ${process.env.BUILD_RESULT}\n\nDeploy: ${process.env.DEPLOY_RESULT}\n\nRun: https://github.com/${owner}/${repo}/actions/runs/${context.runId}\n`;
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: 'main',
              message: 'Update mobile preview status',
              content: Buffer.from(body).toString('base64'),
              sha
            });

