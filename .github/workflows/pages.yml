name: Deploy mobile preview

on:
  push:
    branches:
      - agent/initial-local-first-mapping-app
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always() && github.ref_name == 'agent/initial-local-first-mapping-app'
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Report preview status on PR
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const marker = '<!-- bfid-mobile-preview -->';
            const success = process.env.DEPLOY_RESULT === 'success';
            const body = success
              ? `${marker}\nMobile preview is live: https://snow663.github.io/BFID-mapping/`
              : `${marker}\nMobile preview deployment failed. Build: ${process.env.BUILD_RESULT}; deploy: ${process.env.DEPLOY_RESULT}. Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              per_page: 100
            });
            const prior = comments.find((comment) => comment.body?.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1,
                body
              });
            }
